<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch trình di chuyển</title>
    <!-- CSS Bootstrap (CDN) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom Styles -->
    <link rel="stylesheet" href="css/index.css">
</head>
<body>
    <div class="container">
        <div class="table-container">
            <h2 class="text-center mb-4 text-primary">LỊCH TRÌNH DI CHUYỂN</h2>
            <table class="table table-bordered table-hover text-center align-middle">
                <thead class="table-primary">
                    <tr>
                        <th rowspan="2">THỜI GIAN</th>
                        <th colspan="2">TUYẾN</th>
                    </tr>
                    <tr>
                        <th>Nơi đi</th>
                        <th>Nơi đến</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td rowspan="2" class="fw-bold text-secondary">Sáng</td>
                        <td>Trà Vinh</td>
                        <td>Đà Lạt</td>
                    </tr>
                    <tr>
                        <td>Đà Lạt</td>
                        <td>Hồ Chí Minh</td>
                    </tr>
                    <tr>
                        <td rowspan="2" class="fw-bold text-secondary">Chiều</td>
                        <td>Đà Lạt - Lâm Đồng</td>
                        <td>Huế</td>
                    </tr>    
                    <tr>
                        <td>Huế</td>
                        <td>Vũng tàu</td>
                    </tr>        
                </tbody>
            </table>
        </div>
    </div>

    <!-- JS Bootstrap -->
    <!-- JS Bootstrap (CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
