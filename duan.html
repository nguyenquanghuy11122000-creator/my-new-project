<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Fashion - Bootstrap Version</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/duan.css">
</head>
<body>

    <!--menu -->
    <nav class="navbar navbar-expand-lg navbar-light fixed-top bg-white shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">QUANG HUY FASHION<span>.</span></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-center" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="#">Trang Chủ</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Bộ Sưu Tập</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Nữ</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Nam</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Liên Hệ</a></li>
                </ul>
            </div>
            <div class="nav-icons d-none d-lg-flex">
                <a href="#"><i class="bi bi-search"></i></a>
                <a href="#"><i class="bi bi-person"></i></a>
                <a href="#"><i class="bi bi-bag"></i></a>
            </div>
        </div>
    </nav>

    <!-- dieu huong -->
    <div id="heroCarousel" class="carousel slide carousel-fade" data-bs-ride="carousel">
        <div class="carousel-indicators">
            <button type="button" data-bs-target="#heroCarousel" data-bs-slide-to="0" class="active"></button>
            <button type="button" data-bs-target="#heroCarousel" data-bs-slide-to="1"></button>
            <button type="button" data-bs-target="#heroCarousel" data-bs-slide-to="2"></button>
        </div>
        <div class="carousel-inner">
            <div class="carousel-item active">
                <img src="https://owen.cdn.vccloud.vn/media/codazon/slideshow/t/o/topbanner19.jpg" alt="Fashion 1">
                <div class="carousel-caption d-none d-md-block">
                    <span class="caption-subtitle">Summer Collection 2026</span>
                    <h2 class="caption-title">Hòa Nhịp Cùng<br>Nắng Vàng</h2>
                    <a href="#" class="btn btn-aura">Mua Ngay</a>
                </div>
            </div>
            <div class="carousel-item">
                <img src="https://owen.cdn.vccloud.vn/media/codazon/slideshow/t/o/topbanner20.jpg" alt="Fashion 2">
                <div class="carousel-caption d-none d-md-block">
                    <span class="caption-subtitle">Modern Chic</span>
                    <h2 class="caption-title">Tự Tin Tỏa Sáng<br>Mỗi Ngày</h2>
                    <a href="#" class="btn btn-aura">Khám Phá</a>
                </div>
            </div>
            <div class="carousel-item">
                <img src="https://owen.cdn.vccloud.vn/media/codazon/slideshow/t/o/topbanner18.jpg" alt="Fashion 3">
                <div class="carousel-caption d-none d-md-block">
                    <span class="caption-subtitle">Luxury Label</span>
                    <h2 class="caption-title">Đẳng Cấp<br>Thời Trang Pháp</h2>
                    <a href="#" class="btn btn-aura">Xem Thêm</a>
                </div>
            </div>
        </div>
        <button class="carousel-control-prev" type="button" data-bs-target="#heroCarousel" data-bs-slide="prev">
            <span class="carousel-control-prev-icon"></span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#heroCarousel" data-bs-slide="next">
            <span class="carousel-control-next-icon"></span>
        </button>
    </div>

  
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
